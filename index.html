<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>Área do Aluno – SEMEAR - A Escola da Mulher Empreendedora</title>

  <!-- Fonte padrão (aplicada globalmente em TODOS os slides) -->
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">

  <style>
    /* =========================================================
       RESET + BASE GLOBAL
       ========================================================= */
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { width: 100%; height: 100%; overflow: hidden; background: #050816; }

    /* Fonte padrão aplicada a tudo */
    body {
      font-family: 'Inter', system-ui, -apple-system, Segoe UI, Roboto, Arial, sans-serif;
      color: #F5F7FB;
      -webkit-font-smoothing: antialiased;
      text-rendering: optimizeLegibility;
    }

    input, button, textarea, select { font: inherit; }

    /* =========================================================
       UI FIXA
       ========================================================= */
    .progress {
      position: fixed; top: 0; left: 0; height: 3px; z-index: 1000;
      background: linear-gradient(90deg, #2E6BFF, #C86DD7, #2E6BFF);
      background-size: 200% auto; animation: shimmer 3s linear infinite;
      transition: width .6s ease;
    }

    .fs-btn {
      position: fixed; top: 14px; right: 14px; z-index: 999;
      background: rgba(255,255,255,.04); border: 1px solid rgba(255,255,255,.08);
      color: #7E879B; padding: 10px 14px; border-radius: 10px; cursor: pointer;
      font-size: 11px; font-weight: 600;
      display: flex; align-items: center; gap: 6px;
      transition: all .3s ease; backdrop-filter: blur(6px);
      letter-spacing: .04em; text-transform: uppercase;
    }
    .fs-btn:hover { background: rgba(255,255,255,.08); color: #F5F7FB; border-color: rgba(46,107,255,.3); }
    .fs-btn svg { width: 14px; height: 14px; }
    @media (max-width: 480px) { .fs-btn { display: none; } }

    .sc {
      position: fixed; bottom: 24px; left: 16px; z-index: 998;
      color: #7E879B; font-size: 12px; font-weight: 600; letter-spacing: .05em;
      background: rgba(0,0,0,.3); padding: 8px 14px; border-radius: 10px;
      backdrop-filter: blur(6px); border: 1px solid rgba(255,255,255,.05);
    }
    .sc .cn { color: #2E6BFF; font-weight: 800; }

    .ind {
      position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%); z-index: 998;
      display: flex; gap: 6px; background: rgba(0,0,0,.3); padding: 8px 14px;
      border-radius: 20px; backdrop-filter: blur(8px); border: 1px solid rgba(255,255,255,.05);
    }
    .ind .dot {
      width: 8px; height: 8px; border-radius: 50%;
      background: rgba(255,255,255,.15); transition: all .4s ease; cursor: pointer;
    }
    .ind .dot.active {
      background: #2E6BFF; box-shadow: 0 0 10px rgba(46,107,255,.6);
      width: 28px; border-radius: 5px;
    }

    .nav-arr { position: fixed; bottom: 20px; right: 16px; z-index: 998; display: flex; gap: 8px; }
    .nav-arr button {
      width: 44px; height: 44px; border-radius: 12px;
      background: rgba(255,255,255,.05); border: 1px solid rgba(255,255,255,.1);
      color: #AAB3C5; cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      transition: all .3s ease; backdrop-filter: blur(6px);
    }
    .nav-arr button svg { width: 18px; height: 18px; }
    .nav-arr button:hover {
      background: rgba(46,107,255,.2); border-color: rgba(46,107,255,.4);
      color: #fff; transform: scale(1.05);
    }

    /* =========================================================
       LAYOUT DE SLIDES
       ========================================================= */
    .presentation { width: 100vw; height: 100vh; overflow: hidden; }
    .slides { display: flex; transition: transform .7s cubic-bezier(.22,1,.36,1); }

    .slide {
      width: 100vw; height: 100vh; flex-shrink: 0;
      display: flex; align-items: center; justify-content: center;
      position: relative; overflow: hidden;
      background: linear-gradient(180deg, #0A0F24 0%, #070B1D 45%, #050816 100%);
    }
    .slide::before {
      content: ''; position: absolute; inset: 0; z-index: 0; pointer-events: none;
      background:
        radial-gradient(900px 420px at 72% 18%, rgba(255,120,180,.14) 0%, transparent 42%),
        radial-gradient(800px 380px at 35% 20%, rgba(35,110,255,.14) 0%, transparent 42%),
        linear-gradient(180deg, #0A0F24 0%, #070B1D 45%, #050816 100%);
    }
    .slide::after {
      content: ''; position: absolute; inset: 0; z-index: 0; pointer-events: none; opacity: .3;
      background-image: radial-gradient(rgba(255,255,255,.06) .8px, transparent .8px);
      background-size: 24px 24px;
    }
    .slide > * { position: relative; z-index: 1; }

    /* Scroll interno por slide (mobile-friendly) */
    .slide-scroll {
      width: 100%; height: 100%;
      overflow-y: auto; overflow-x: hidden;
      display: flex; align-items: flex-start; justify-content: center;
      padding: 72px 20px 90px;
      position: relative; z-index: 1;
      -webkit-overflow-scrolling: touch;
    }
    .slide-scroll::-webkit-scrollbar { width: 3px; }
    .slide-scroll::-webkit-scrollbar-track { background: transparent; }
    .slide-scroll::-webkit-scrollbar-thumb { background: rgba(46,107,255,.3); border-radius: 2px; }

    /* Conteúdo centralizado */
    .slide-center {
      width: 100%; height: 100%;
      display: flex; align-items: center; justify-content: center;
      padding: 72px 20px 90px;
      position: relative; z-index: 1;
    }

    /* =========================================================
       IDENTIDADE VISUAL
       ========================================================= */
    .gt {
      background: linear-gradient(135deg, #2E6BFF 0%, #C86DD7 50%, #2E6BFF 100%);
      background-size: 200% auto;
      -webkit-background-clip: text; -webkit-text-fill-color: transparent;
      background-clip: text; animation: shimmer 4s linear infinite;
    }
    .gl {
      width: 70px; height: 4px; border-radius: 2px;
      background: linear-gradient(90deg, #2E6BFF, #C86DD7);
      margin-bottom: 18px; animation: lineG .8s ease both; transform-origin: left;
    }
    .gl.ce { margin: 0 auto 18px auto; transform-origin: center; }

    .badge {
      display: inline-flex; align-items: center; gap: 8px;
      padding: 8px 16px; border-radius: 999px; margin-bottom: 24px;
      background: rgba(46,107,255,.08); border: 1px solid rgba(46,107,255,.2);
      font-size: 11px; font-weight: 600; color: #8FAEFF;
      letter-spacing: .05em; text-transform: uppercase;
      text-align: center; flex-wrap: wrap; justify-content: center;
    }

    .card {
      background: rgba(255,255,255,.03); border: 1px solid rgba(255,255,255,.07);
      border-radius: 18px;
      box-shadow: 0 16px 48px rgba(0,0,0,.4), inset 0 1px 0 rgba(255,255,255,.04);
      padding: 24px 20px; backdrop-filter: blur(8px); transition: all .4s ease;
    }
    .card:hover { border-color: rgba(46,107,255,.2); transform: translateY(-2px); box-shadow: 0 24px 60px rgba(0,0,0,.5), 0 0 30px rgba(46,107,255,.08); }

    .ic { width: 46px; height: 46px; border-radius: 12px; margin-bottom: 14px; display: flex; align-items: center; justify-content: center; background: rgba(46,107,255,.08); }
    .ic svg { width: 22px; height: 22px; color: #2E6BFF; }

    .fl { display: flex; align-items: center; justify-content: center; gap: 0; flex-wrap: wrap; row-gap: 16px; }
    .fs-step { display: flex; flex-direction: column; align-items: center; text-align: center; min-width: 80px; padding: 0 6px; }
    .fs-step .fi {
      width: 60px; height: 60px; border-radius: 16px;
      background: rgba(46,107,255,.08); border: 1px solid rgba(46,107,255,.18);
      display: flex; align-items: center; justify-content: center; margin-bottom: 10px;
    }
    .fs-step .fi svg { width: 26px; height: 26px; color: #2E6BFF; }
    .fs-step span { font-size: 12px; font-weight: 600; color: #F5F7FB; line-height: 1.3; }
    .fa { display: flex; align-items: center; padding-bottom: 24px; margin: 0 2px; }
    .fa svg { width: 20px; height: 20px; color: #7E879B; }
    .fs-step.act .fi { background: linear-gradient(180deg, #2E6BFF, #1E56D9); border-color: transparent; box-shadow: 0 10px 22px rgba(46,107,255,.28); }
    .fs-step.act .fi svg { color: #fff; }

    .cta-btn {
      display: inline-flex; align-items: center; gap: 10px;
      background: linear-gradient(135deg, #2E6BFF, #5B3FD6);
      color: #fff; font-size: 15px; font-weight: 700;
      padding: 16px 28px; border-radius: 14px; border: none; cursor: pointer;
      text-decoration: none; letter-spacing: .01em;
      box-shadow: 0 12px 36px rgba(46,107,255,.35);
      transition: all .3s ease;
      white-space: nowrap;
    }
    .cta-btn:hover { transform: scale(1.04) translateY(-2px); box-shadow: 0 20px 48px rgba(46,107,255,.5); }
    .cta-btn svg { width: 18px; height: 18px; flex-shrink: 0; }

    /* =========================================================
       ANIMAÇÕES
       ========================================================= */
    @keyframes fadeUp    { from { opacity:0; transform:translateY(30px) } to { opacity:1; transform:translateY(0) } }
    @keyframes fadeScale { from { opacity:0; transform:scale(.88) }        to { opacity:1; transform:scale(1) } }
    @keyframes shimmer   { 0%   { background-position:-200% center }       100% { background-position:200% center } }
    @keyframes lineG     { from { transform:scaleX(0) }                    to   { transform:scaleX(1) } }
    @keyframes pipEntrance { from { opacity:0; transform:translateY(18px) scale(.94) } to { opacity:1; transform:translateY(0) scale(1) } }
    @keyframes pipLeave    { from { opacity:1; transform:translateY(0) scale(1) }      to { opacity:0; transform:translateY(18px) scale(.94) } }
    @keyframes livePulse   { 0%,100% { box-shadow:0 0 0 0 rgba(46,107,255,.5) }       60% { box-shadow:0 0 0 5px rgba(46,107,255,0) } }

    .slide.active .au { animation: fadeUp .7s ease both; }
    .slide.active .as { animation: fadeScale .7s ease both; }
    .d1{animation-delay:.10s!important} .d2{animation-delay:.22s!important}
    .d3{animation-delay:.34s!important} .d4{animation-delay:.46s!important}
    .d5{animation-delay:.58s!important} .d6{animation-delay:.70s!important}
    .d7{animation-delay:.82s!important}

    /* =========================================================
       PiP (vídeo flutuante)
       ========================================================= */
    #pip {
      position: fixed; bottom: 80px; right: 14px; z-index: 1500;
      width: 220px; border-radius: 14px; overflow: hidden;
      background: linear-gradient(160deg,#0E0A2B 0%,#080C1C 100%);
      border: 1px solid rgba(255,255,255,.10);
      box-shadow: 0 20px 56px rgba(0,0,0,.60), 0 0 32px rgba(46,107,255,.08);
      animation: pipEntrance .55s cubic-bezier(.22,1,.36,1) both;
      transition: width .35s cubic-bezier(.22,1,.36,1), bottom .35s ease;
    }
    #pip.big { width: 320px; }
    #pip.gone { animation: pipLeave .28s ease forwards; pointer-events:none; }
    @media (max-width: 480px) {
      #pip { width: 180px; bottom: 80px; right: 10px; }
      #pip.big { width: 260px; }
    }

    .pip-bar {
      display: flex; align-items: center; justify-content: space-between;
      padding: 8px 10px; background: rgba(255,255,255,.025);
      border-bottom: 1px solid rgba(255,255,255,.06);
    }
    .pip-bar-l { display: flex; align-items: center; gap: 7px; }
    .pip-live { width: 6px; height: 6px; border-radius: 50%; background: #2E6BFF; animation: livePulse 2s ease-in-out infinite; }
    .pip-title { font-size: 10px; font-weight: 700; color: #8FAEFF; letter-spacing: .06em; text-transform: uppercase; }
    .pip-bar-r { display: flex; gap: 4px; }
    .pip-ibtn {
      width: 24px; height: 24px; border-radius: 6px;
      background: rgba(255,255,255,.05); border: 1px solid rgba(255,255,255,.08);
      color: #7E879B; cursor: pointer;
      display: flex; align-items: center; justify-content: center; transition: .2s ease;
    }
    .pip-ibtn:hover { background: rgba(255,255,255,.10); color: #F5F7FB; }
    .pip-ibtn.pip-close:hover { background: rgba(255,60,60,.12); border-color: rgba(255,60,60,.3); color: #FF6B6B; }
    .pip-ibtn svg { width: 11px; height: 11px; }

    .pip-thumb {
      position: relative; width: 100%; padding-top: 56.25%;
      cursor: pointer; overflow: hidden; background: #000; display: block;
    }
    .pip-thumb img { position: absolute; inset: 0; width: 100%; height: 100%; object-fit: cover; filter: brightness(.65); transition: filter .35s ease, transform .4s ease; }
    .pip-thumb:hover img { filter: brightness(.45); transform: scale(1.04); }
    .pip-tgrad { position: absolute; inset: 0; background: linear-gradient(160deg,rgba(46,107,255,.12) 0%,rgba(200,109,215,.08) 100%); }
    .pip-play {
      position: absolute; top: 50%; left: 50%; transform: translate(-50%,-50%);
      width: 40px; height: 40px; border-radius: 50%;
      background: rgba(255,255,255,.13); border: 2px solid rgba(255,255,255,.28);
      display: flex; align-items: center; justify-content: center; backdrop-filter: blur(4px);
      transition: all .3s ease;
    }
    .pip-thumb:hover .pip-play { background: linear-gradient(135deg,#2E6BFF,#C86DD7); border-color: transparent; transform: translate(-50%,-50%) scale(1.14); box-shadow: 0 0 26px rgba(46,107,255,.55); }
    .pip-play svg { width: 14px; height: 14px; color: #fff; margin-left: 2px; }
    .pip-caption { position: absolute; bottom: 0; left: 0; right: 0; padding: 18px 10px 8px; background: linear-gradient(0deg,rgba(0,0,0,.72) 0%,transparent 100%); }
    .pip-caption strong { font-size: 11px; font-weight: 700; color: #F5F7FB; display: block; line-height: 1.3; }
    .pip-caption span { font-size: 9px; color: #AAB3C5; }

    .pip-player { display: none; position: relative; width: 100%; padding-top: 56.25%; background: #000; }
    .pip-player.on { display: block; }
    .pip-player iframe { position: absolute; inset: 0; width: 100%; height: 100%; border: 0; }

    .pip-foot { display: flex; align-items: center; justify-content: space-between; gap: 6px; padding: 8px 10px; }
    .pip-foot-l { display: flex; align-items: center; gap: 7px; min-width: 0; }
    .pip-icon { width: 24px; height: 24px; border-radius: 6px; flex-shrink: 0; background: linear-gradient(135deg,#2E6BFF,#C86DD7); display: flex; align-items: center; justify-content: center; }
    .pip-icon svg { width: 10px; height: 10px; color: #fff; margin-left: 1px; }
    .pip-info strong { font-size: 10px; font-weight: 700; color: #F5F7FB; display: block; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; max-width: 110px; }
    .pip-info span { font-size: 9px; color: #7E879B; }
    .pip-yt {
      display: inline-flex; align-items: center; gap: 4px;
      padding: 4px 8px; border-radius: 7px;
      background: rgba(255,255,255,.04); border: 1px solid rgba(255,255,255,.08);
      color: #7E879B; font-size: 9px; font-weight: 600; text-decoration: none;
      transition: .2s ease; white-space: nowrap; flex-shrink: 0;
    }
    .pip-yt:hover { color: #F5F7FB; border-color: rgba(46,107,255,.3); background: rgba(46,107,255,.08); }
    .pip-yt svg { width: 9px; height: 9px; }

    /* =========================================================
       SLIDE 1 — logo no topo no mobile + composição equilibrada
       ========================================================= */
    .s1-wrap { text-align: center; max-width: 880px; width: 100%; }

    .logo-img {
      width: 100%;
      max-width: 240px;
      height: auto;
      display: block;
      margin: 0 auto;
    }

    /* Título "Seja bem-vinda" com mesmo DNA visual dos outros slides */
    .s1-title {
      margin: 0 0 12px;
      text-align: center;
      color: #F5F7FB;
      font-size: clamp(18px, 2.4vw, 28px);
      font-weight: 800;
      letter-spacing: -0.02em;
      line-height: 1.15;
    }

    /* Subtítulo de apoio */
    .s1-sub {
      margin: 0 auto;
      max-width: 560px;
      color: #AAB3C5;
      font-size: clamp(13px, 1.8vw, 16px);
      line-height: 1.55;
    }

    /* Stack vertical dos elementos do slide 1 */
    .s1-stack {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 12px;
    }

    /* Mobile: puxa para o topo e melhora legibilidade */
    @media (max-width: 768px) {
      .slide-center.s1-top {
        justify-content: flex-start !important;
        padding-top: 18px !important;
        padding-bottom: 90px !important;
      }
      .s1-stack { justify-content: flex-start; gap: 10px; }
      .logo-img { max-width: 200px; }
      .badge { margin-bottom: 14px; }
    }

    /* Mobile muito pequeno */
    @media (max-width: 360px) {
      .logo-img { max-width: 180px; }
