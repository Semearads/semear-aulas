<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Modal de Vídeo - Shorts</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      background: #0a0a0a;
      color: #fff;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    /* ===== BOTÃO PRINCIPAL ===== */
    .btn-play {
      display: inline-flex;
      align-items: center;
      gap: 12px;
      padding: 16px 32px;
      background: linear-gradient(135deg, #ff0050, #ff2d75);
      color: #fff;
      font-size: 1.1rem;
      font-weight: 600;
      border: none;
      border-radius: 50px;
      cursor: pointer;
      transition: transform 0.2s, box-shadow 0.2s;
      box-shadow: 0 4px 20px rgba(255, 0, 80, 0.4);
    }

    .btn-play:hover {
      transform: scale(1.05);
      box-shadow: 0 6px 30px rgba(255, 0, 80, 0.6);
    }

    .btn-play svg {
      width: 24px;
      height: 24px;
      fill: #fff;
    }

    /* ===== OVERLAY ===== */
    .video-modal-overlay {
      position: fixed;
      inset: 0;
      background: rgba(0, 0, 0, 0.85);
      backdrop-filter: blur(8px);
      z-index: 9999;
      display: flex;
      align-items: center;
      justify-content: center;
      opacity: 0;
      visibility: hidden;
      transition: opacity 0.3s, visibility 0.3s;
    }

    .video-modal-overlay.active {
      opacity: 1;
      visibility: visible;
    }

    /* ===== MODAL (FORMATO VERTICAL / SHORTS) ===== */
    .video-modal {
      position: relative;
      width: 90%;
      max-width: 400px;
      background: #111;
      border-radius: 20px;
      overflow: hidden;
      box-shadow: 0 20px 60px rgba(0, 0, 0, 0.8);
      transform: scale(0.9) translateY(20px);
      transition: transform 0.3s ease;
    }

    .video-modal-overlay.active .video-modal {
      transform: scale(1) translateY(0);
    }

    /* ===== CONTAINER DO VÍDEO (9:16) ===== */
    .video-modal-wrapper {
      position: relative;
      width: 100%;
      aspect-ratio: 9 / 16;
      background: #000;
    }

    .video-modal-wrapper iframe {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      border: none;
    }

    /* ===== RODAPÉ DO MODAL ===== */
    .video-modal-footer {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 14px 18px;
      background: #111;
      border-top: 1px solid rgba(255, 255, 255, 0.08);
    }

    .video-modal-yt {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      color: #ff0050;
      font-size: 0.85rem;
      font-weight: 600;
      text-decoration: none;
      transition: opacity 0.2s;
    }

    .video-modal-yt:hover {
      opacity: 0.8;
    }

    .video-modal-yt svg {
      width: 18px;
      height: 18px;
      fill: #ff0050;
    }

    /* ===== BOTÃO FECHAR ===== */
    .video-modal-close {
      position: absolute;
      top: 10px;
      right: 10px;
      width: 36px;
      height: 36px;
      background: rgba(0, 0, 0, 0.7);
      border: none;
      border-radius: 50%;
      color: #fff;
      font-size: 1.3rem;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 10;
      transition: background 0.2s;
    }

    .video-modal-close:hover {
      background: rgba(255, 0, 80, 0.8);
    }

    /* ===== RESPONSIVO ===== */
    @media (max-width: 480px) {
      .video-modal {
        width: 95%;
        max-width: 350px;
      }
    }

    @media (min-height: 800px) {
      .video-modal {
        max-width: 420px;
      }
    }
  </style>
</head>
<body>

  <!-- BOTÃO PARA ABRIR O MODAL -->
  <button class="btn-play" id="btnOpenModal">
    <svg viewBox="0 0 24 24"><path d="M8 5v14l11-7z"/></svg>
    Assistir vídeo
  </button>

  <!-- MODAL DO VÍDEO -->
  <div class="video-modal-overlay" id="videoModalOverlay">
    <div class="video-modal">
      <button class="video-modal-close" id="btnCloseModal" aria-label="Fechar">&times;</button>

      <div class="video-modal-wrapper">
        <iframe
          id="videoModalIframe"
          src=""
          allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture; web-share"
          allowfullscreen>
        </iframe>
      </div>

      <div class="video-modal-footer">
        <a class="video-modal-yt" href="https://www.youtube.com/watch?v=jWXgbQKV3h4" target="_blank" rel="noopener">
          <svg viewBox="0 0 24 24"><path d="M10 15l5.19-3L10 9v6m11.56-7.83c.13.47.22 1.1.28 1.9.07.8.1 1.49.1 2.09L22 12c0 2.19-.16 3.8-.44 4.83-.25.9-.83 1.48-1.73 1.73-.47.13-1.33.22-2.65.28-1.3.07-2.49.1-3.59.1L12 19c-4.19 0-6.8-.16-7.83-.44-.9-.25-1.48-.83-1.73-1.73-.13-.47-.22-1.1-.28-1.9-.07-.8-.1-1.49-.1-2.09L2 12c0-2.19.16-3.8.44-4.83.25-.9.83-1.48 1.73-1.73.47-.13 1.33-.22 2.65-.28 1.3-.07 2.49-.1 3.59-.1L12 5c4.19 0 6.8.16 7.83.44.9.25 1.48.83 1.73 1.73z"/></svg>
          Abrir no YouTube
        </a>
      </div>
    </div>
  </div>

  <script>
    // ===== CONFIGURAÇÃO DO VÍDEO =====
    const VIDEO_MODAL_SRC = 'https://www.youtube.com/embed/jWXgbQKV3h4?autoplay=1&rel=0&modestbranding=1';

    // ===== ELEMENTOS =====
    const overlay = document.getElementById('videoModalOverlay');
    const iframe = document.getElementById('videoModalIframe');
    const btnOpen = document.getElementById('btnOpenModal');
    const btnClose = document.getElementById('btnCloseModal');

    // ===== ABRIR MODAL =====
    btnOpen.addEventListener('click', () => {
      iframe.src = VIDEO_MODAL_SRC;
      overlay.classList.add('active');
      document.body.style.overflow = 'hidden';
    });

    // ===== FECHAR MODAL =====
    function closeModal() {
      overlay.classList.remove('active');
      iframe.src = '';
      document.body.style.overflow = '';
    }

    btnClose.addEventListener('click', closeModal);

    overlay.addEventListener('click', (e) => {
      if (e.target === overlay) closeModal();
    });

    document.addEventListener('keydown', (e) => {
      if (e.key === 'Escape') closeModal();
    });
  </script>

</body>
</html>
