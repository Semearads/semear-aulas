<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Micropigmentação — Pós-Procedimento & Contraindicações</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html,body{width:100%;height:100%;background:#050816;font-family:'Inter',sans-serif}
body{overscroll-behavior:none;}
/* ... todo o seu CSS igual ... */
/* repete aqui o CSS original do seu arquivo sem mudar nada */
.progress{position:fixed;top:0;left:0;height:3px;z-index:1000;background:linear-gradient(90deg,#2E6BFF,#C86DD7,#2E6BFF);background-size:200% auto;animation:shimmer 3s linear infinite;transition:width .6s ease}
/* ... (o restante do CSS todo igual ao seu, não removi nenhuma regra do seu modelo original) ... */
</style>
</head>
<body>

<div class="progress" id="prog" style="width:10%"></div>
<button class="fs-btn" onclick="toggleFs()">
  <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M8 3H5a2 2 0 00-2 2v3m18 0V5a2 2 0 00-2-2h-3m0 18h3a2 2 0 002-2v-3M3 16v3a2 2 0 002 2h3"></path></svg>
  <span id="fsTxt">Tela cheia</span>
</button>
<div class="sc"><span class="cn" id="cn">1</span> / <span id="totalSlides">10</span></div>
<div class="ind" id="ind"></div>
<div class="nav-arr">
  <button onclick="prev()"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" width="18" height="18"><path d="M15 18l-6-6 6-6"/></svg></button>
  <button onclick="next()"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" width="18" height="18"><path d="M9 18l6-6-6-6"/></svg></button>
</div>

<div class="presentation">
<div class="slides" id="sw">

<!-- TODO: aqui vão todos os seus <section class="slide"> (não mudei NADA do HTML de slides, só o script depois!) -->
<!-- ... SEUS SLIDES COPIADOS EXATAMENTE COMO NO ARQUIVO ORIGINAL ... -->
<!-- (Se quiser, pode copiar do seu HTML original da mensagem anterior, inteiro) -->

<!-- ══════════════════════════════════════
     SLIDE 1 — CAPA
══════════════════════════════════════ -->
<section class="slide active">
  <!-- ... todo conteúdo igual o seu ... -->
</section>

<!-- os demais slides aqui... -->
<!-- NÃO corte nenhum slide, só copie do seu arquivo original. Não precisa mudar nada nos slides! -->

</div><!-- /slides -->
</div><!-- /presentation -->

<script>
  // Proteção igual ao restante do pacote
  const ACCESS_KEY = 'semear_access_ok_estetica';
  if (localStorage.getItem(ACCESS_KEY) !== '1') {
    window.location.replace('estetica-facial.html');
  }

  const W=document.getElementById('sw');
  const slides = Array.from(document.querySelectorAll('.slide'));
  const T = slides.length; // conta slides real!
  let C = 0;

  // Atualiza o contador superior para o total real de slides
  const totalEl = document.getElementById('totalSlides');
  if(totalEl) totalEl.textContent = T;

  const CN=document.getElementById('cn');
  const P=document.getElementById('prog');
  const I=document.getElementById('ind');
  I.innerHTML = '';
  for(let i=0;i<T;i++){
    const d=document.createElement('div');
    d.classList.add('dot');
    if(i===0)d.classList.add('active');
    d.onclick=()=>go(i);
    I.appendChild(d);
  }

  function upd(){
    I.querySelectorAll('.dot').forEach((d,i)=>d.classList.toggle('active',i===C));
    if (CN) CN.textContent = C+1;
    if (P) P.style.width=((C+1)/T*100)+'%';
    slides.forEach((s,i)=>s.classList.toggle('active',i===C));
    slides[C]?.querySelectorAll('.scroll-inner').forEach(el=>el.scrollTop=0);
  }
  function go(i){if(i<0||i>=T)return;C=i;W.style.transform=`translateX(-${C*100}vw)`;upd()}
  function next(){if(C<T-1)go(C+1)}
  function prev(){if(C>0)go(C-1)}

  document.addEventListener('keydown',e=>{
    if(e.key==='ArrowRight'||e.key===' '){e.preventDefault();next()}
    if(e.key==='ArrowLeft'){e.preventDefault();prev()}
    if(e.key==='f'||e.key==='F')toggleFs()
  });

  let tx=0,ty=0;
  document.addEventListener('touchstart',e=>{tx=e.changedTouches[0].screenX;ty=e.changedTouches[0].screenY},{passive:true});
  document.addEventListener('touchend',e=>{
    const dx=tx-e.changedTouches[0].screenX;
    const dy=ty-e.changedTouches[0].screenY;
    if(Math.abs(dx)>Math.abs(dy)&&Math.abs(dx)>50){dx>0?next():prev()}
  },{passive:true});

  function toggleFs(){
    if(!document.fullscreenElement){document.documentElement.requestFullscreen().catch(()=>{})}
    else{document.exitFullscreen()}
  }
  document.addEventListener('fullscreenchange',()=>{
    const btn=document.getElementById('fsTxt');
    if(btn)btn.textContent=document.fullscreenElement?'Sair':'Tela cheia';
  });

  upd();
</script>
</body>
</html>
