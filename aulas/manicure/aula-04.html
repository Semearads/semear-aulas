</div><!-- fecha .slides -->

<script>
(function(){
  const container = document.querySelector('.slides');
  const slides = container.querySelectorAll('.slide');
  const total = slides.length;
  const progress = document.getElementById('prog');
  const cn = document.getElementById('cn');
  const ind = document.getElementById('ind');
  const fsTxt = document.getElementById('fsTxt');

  let current = 0;
  let isTransitioning = false;

  for(let i = 0; i < total; i++){
    const dot = document.createElement('div');
    dot.className = 'dot' + (i === 0 ? ' active' : '');
    dot.addEventListener('click', function(){ goTo(i); });
    ind.appendChild(dot);
  }

  function updateUI(){
    container.style.transform = 'translateX(-' + (current * 100) + 'vw)';
    slides.forEach(function(s, i){
      s.classList.toggle('active', i === current);
    });
    const dots = ind.querySelectorAll('.dot');
    dots.forEach(function(d, i){
      d.classList.toggle('active', i === current);
    });
    cn.textContent = current + 1;
    progress.style.width = ((current + 1) / total * 100) + '%';
  }

  function goTo(index){
    if(isTransitioning || index === current) return;
    if(index < 0 || index >= total) return;
    isTransitioning = true;
    current = index;
    updateUI();
    setTimeout(function(){ isTransitioning = false; }, 750);
  }

  window.next = function(){ goTo(current + 1); };
  window.prev = function(){ goTo(current - 1); };
  window.toggleFs = function(){
    if(!document.fullscreenElement){
      document.documentElement.requestFullscreen().catch(function(){});
    } else {
      document.exitFullscreen();
    }
  };
  document.addEventListener('fullscreenchange', function(){
    fsTxt.textContent = document.fullscreenElement ? 'Sair tela cheia' : 'Tela cheia';
  });

  let touchStartX = 0;
  let touchStartY = 0;
  container.addEventListener('touchstart', function(e){
    touchStartX = e.touches[0].clientX;
    touchStartY = e.touches[0].clientY;
  }, {passive:true});
  container.addEventListener('touchend', function(e){
    const dx = e.changedTouches[0].clientX - touchStartX;
    const dy = e.changedTouches[0].clientY - touchStartY;
    if(Math.abs(dx) > Math.abs(dy) && Math.abs(dx) > 50){
      if(dx < 0) window.next();
      else window.prev();
    }
  });

  document.addEventListener('keydown', function(e){
    if(e.key==='ArrowRight'||e.key==='ArrowDown'||e.key===' '){
      e.preventDefault(); window.next();
    } else if(e.key==='ArrowLeft'||e.key==='ArrowUp'){
      e.preventDefault(); window.prev();
    } else if(e.key==='Home'){
      e.preventDefault(); goTo(0);
    } else if(e.key==='End'){
      e.preventDefault(); goTo(total-1);
    } else if(e.key==='f'||e.key==='F'){
      e.preventDefault(); window.toggleFs();
    }
  });

  updateUI();
})();
</script>
