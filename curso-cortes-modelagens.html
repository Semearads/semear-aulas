<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>Curso de Cotes e Modelagens</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #050816;
      --card: rgba(255,255,255,.04);
      --border: rgba(255,255,255,.08);
      --text: #F5F7FB;
      --muted: #AAB3C5;
      --blue: #2E6BFF;
      --pink: #C86DD7;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: Inter, system-ui, -apple-system, Segoe UI, Roboto, Arial, sans-serif;
      background:
        radial-gradient(900px 420px at 72% 18%, rgba(255,120,180,.14) 0%, transparent 42%),
        radial-gradient(800px 380px at 35% 20%, rgba(35,110,255,.14) 0%, transparent 42%),
        linear-gradient(180deg, #0A0F24 0%, #070B1D 45%, #050816 100%);
      color: var(--text);
      min-height: 100vh;
      padding: 28px 16px 48px;
    }

    .wrap {
      max-width: 860px;
      margin: 0 auto;
      width: 100%;
    }

    .badge {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 8px 14px;
      border-radius: 999px;
      background: rgba(46,107,255,.08);
      border: 1px solid rgba(46,107,255,.2);
      color: #8FAEFF;
      font-weight: 700;
      font-size: clamp(11px, 2.5vw, 12px);
      letter-spacing: .04em;
      text-transform: uppercase;
      flex-wrap: wrap;
    }

    h1 {
      margin: 16px 0 8px;
      font-size: clamp(22px, 5vw, 44px);
      letter-spacing: -.02em;
      line-height: 1.15;
      word-break: break-word;
    }

    .subtitle {
      margin: 0 0 24px;
      color: var(--muted);
      line-height: 1.7;
      font-size: clamp(13px, 2.5vw, 15px);
    }

    .grid {
      display: grid;
      gap: 12px;
      grid-template-columns: 1fr;
    }

    @media (min-width: 640px) {
      .grid { grid-template-columns: 1fr 1fr; }
    }

    a.card {
      display: flex;
      flex-direction: column;
      text-decoration: none;
      color: inherit;
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 18px 16px;
      transition: .2s ease;
      -webkit-tap-highlight-color: transparent;
    }

    a.card:hover,
    a.card:active {
      transform: translateY(-2px);
      border-color: rgba(46,107,255,.35);
      background: rgba(46,107,255,.05);
    }

    .card-title {
      font-weight: 800;
      font-size: clamp(14px, 3vw, 16px);
      line-height: 1.4;
      margin-bottom: 8px;
      word-break: break-word;
    }

    .card-desc {
      color: var(--muted);
      font-size: clamp(12px, 2.4vw, 13px);
      line-height: 1.6;
      flex: 1;
      word-break: break-word;
    }

    .pill {
      display: inline-block;
      align-self: flex-start;
      margin-top: 14px;
      font-size: clamp(11px, 2.2vw, 12px);
      font-weight: 800;
      padding: 7px 14px;
      border-radius: 999px;
      background: linear-gradient(135deg, rgba(46,107,255,.18), rgba(200,109,215,.18));
      border: 1px solid rgba(255,255,255,.10);
      white-space: nowrap;
    }

    .btn-back {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      margin-top: 32px;
      background: rgba(255,255,255,.04);
      border: 1px solid rgba(255,255,255,.10);
      color: #AAB3C5;
      padding: 12px 18px;
      border-radius: 12px;
      text-decoration: none;
      font-weight: 600;
      font-size: clamp(12px, 2.5vw, 14px);
      transition: .25s ease;
      -webkit-tap-highlight-color: transparent;
    }

    .btn-back:hover,
    .btn-back:active {
      color: #F5F7FB;
      border-color: rgba(46,107,255,.3);
    }

    .btn-back svg { flex-shrink: 0; }

    .footer {
      margin-top: 24px;
      color: #7E879B;
      font-size: clamp(11px, 2.2vw, 12px);
    }

    .footer a { color: #8FAEFF; }
  </style>
</head>
<body>
  <div class="wrap">

    <div class="badge">🎨 Coloração Capilar</div>
    <h1>Curso de Coloração Capilar</h1>
    <p class="subtitle">Selecione uma aula para abrir.</p>

    <div class="grid">

      <a class="card" href="aulas/coloracao/aula-01.html">
        <div class="card-title">Aula 01 — Cortes que Vendem</div>
        <p class="card-desc">Do ZERO</p>
        <span class="pill">Abrir aula</span>
      </a>

      <a class="card" href="aulas/coloracao/aula-02.html">
        <div class="card-title">Aula 02 — Modelagens</div>
        <p class="card-desc">Pratica</p>
        <span class="pill">Abrir aula</span>
      </a>

    </div>

    <a href="cabeleireiro.html" class="btn-back">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" width="16" height="16" aria-hidden="true" focusable="false">
        <path d="M15 18l-6-6 6-6"/>
      </svg>
      Voltar ao Pacote Cabeleireiro
    </a>

    <div class="footer">
      Instituto Semear &mdash; Todos os direitos reservados.
    </div>

  </div>
</body>
</html>
