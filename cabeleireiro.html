      color: #F5F7FB;
      font-weight: 700;
      font-size: 17px;

      backdrop-filter: blur(8px);
      cursor: pointer;
    }

      border-color: rgba(46,107,255,.35);

      box-shadow: 0 8px 32px rgba(46,107,255,.15);
    }

      align-items: center;
